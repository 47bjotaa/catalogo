<style>

:root{
--primary-blue:#d10000;
--secondary-blue:#ff3b3b;
--dark-bg:#000;
--light-bg:#f8f9fa;
--white:#fff;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    /* Degradado llamativo: Rojo Torakku a Naranja Vibrante */
    background: linear-gradient(180deg, #d10000 0%, #ea2424 50%, #ea922f 100%);
    background-attachment: fixed; /* Esto hace que el color cambie visualmente al bajar */
    background-size: cover;
    color: #333;
    margin: 0;
}

/* PANTALLA INICIAL */

.welcome-screen{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:var(--dark-bg);
border-bottom:10px solid var(--primary-blue);
text-align:center;
}

.brand-name{
font-size:clamp(3rem,12vw,7rem);
font-weight:900;
color:white;
letter-spacing:-2px;
text-transform:uppercase;
line-height:.8;
}

.brand-name span{color:var(--primary-blue)}

.brand-subtitle{
font-size:1.1rem;
color:var(--secondary-blue);
letter-spacing:6px;
text-transform:uppercase;
margin-top:15px;
}

.scroll-indicator{
margin-top:50px;
font-size:1.2rem;
color:white;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,20%,50%,80%,100%{transform:translateY(0)}
40%{transform:translateY(-10px)}
}

/* FILTROS */

.filter-nav{
position:sticky;
top:0;
background:rgba(255,255,255,.98);
backdrop-filter:blur(5px);
padding:15px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
z-index:1000;
box-shadow:0 2px 15px rgba(0,0,0,.1);
}

.filter-btn{
padding:10px 18px;
border:2px solid var(--primary-blue);
background:transparent;
color:var(--primary-blue);
border-radius:4px;
font-weight:bold;
cursor:pointer;
transition:.3s;
text-transform:uppercase;
font-size:.8rem;
}

.filter-btn:hover,
.filter-btn.active{
background:var(--primary-blue);
color:white;
}

#searchInput{
width:100%;
max-width:400px;
padding:12px;
border:2px solid var(--primary-blue);
border-radius:4px;
outline:none;
font-family:inherit;
}

#contador{
width:100%;
text-align:center;
font-size:.9rem;
}

/* GRID */

.catalog-container{
max-width:1200px;
margin:40px auto;
padding:0 20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:25px;
}

.card {
    background: rgba(255, 255, 255, 0.95); /* Blanco ligeramente transparente */
    border: none;
    padding: 15px;
    display: flex;
    flex-direction: column;
    position: relative;
    transition: .3s;
    border-radius: 8px; /* Bordes redondeados para que se vea más moderno */
    box-shadow: 0 4px 15px rgba(0,0,0,0.2); /* Sombra más marcada */
}

.card:hover{
box-shadow:0 10px 30px rgba(0,0,0,.08);
border-color:var(--primary-blue);
transform:translateY(-5px);
}

.card-tag{
position:absolute;
top:10px;
right:10px;
font-size:10px;
background:#f0f0f0;
padding:2px 8px;
border-radius:10px;
color:#666;
font-weight:bold;
}

.card-img{
width:100%;
height:180px;
object-fit:contain;
margin-bottom:15px;
background:#fafafa;
padding:10px;
border-bottom:1px solid #eee;
transition:transform .25s ease;
}

.card:hover .card-img{
transform:scale(1.05);
}

.card-img-placeholder{
width:100%;
height:180px;
background:#f2f2f2;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
color:#999;
border-bottom:1px solid #eee;
}

.card-title{
font-size:.95rem;
font-weight:700;
margin-bottom:15px;
min-height:50px;
display:flex;
align-items:center;
text-transform:uppercase;
}

.btn-wa{
background:#1a1a1a;
color:white;
text-decoration:none;
text-align:center;
padding:12px;
font-size:.8rem;
font-weight:bold;
border-radius:2px;
transition:.3s;
letter-spacing:1px;
}

.btn-wa:hover{
background:var(--primary-blue);
}

.hidden{display:none}

footer{
padding:60px 20px;
background:black;
color:white;
text-align:center;
}
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:white;
padding:30px;
max-width:400px;
width:90%;
border-radius:10px;
text-align:center;
position:relative;
animation:aparecer .3s ease;
}

@keyframes aparecer{
from{transform:scale(.8);opacity:0}
to{transform:scale(1);opacity:1}

.cerrarModal{
position:absolute;
top:10px;
right:15px;

cursor:pointer;

width:100%;

margin-bottom:15px;

.modal-precio{
font-size:28px;
font-weight:900;
color:#004fb3;
margin:15px 0;
}

</style>
</head>

function generarCatalogo(){

const container=document.getElementById("catalogContainer");
const fragment=document.createDocumentFragment();

productos.forEach(p=>{

const card=document.createElement("div");
card.className="card";
card.setAttribute("data-model",p.modelo);

card.innerHTML=`

<span class="card-tag">MODELO ${p.modelo}</span>

<img class="card-img" src="${p.imagen}"
onerror="this.outerHTML='<div class=card-img-placeholder>Imagen no disponible</div>'">

<h3 class="card-title">${p.nombre}</h3>

<button class="btn-wa"
onclick="verProducto('${p.nombre}','${p.imagen}','${p.precio || "Consultar"}')">
VER DETALLES
</button>

`;

fragment.appendChild(card);

});

container.appendChild(fragment);

}

let lastModel="all";

window.onload=function(){

generarCatalogo();
filter("all");

setTimeout(()=>{
document.getElementById("catalog-nav")
.scrollIntoView({behavior:"smooth"});
},1800);

};

function filter(model){

if(model) lastModel=model;

const search=document
.getElementById("searchInput")
.value.toLowerCase();

const cards=document.querySelectorAll(".card");

let visibles=0;

cards.forEach(card=>{

const title=card
.querySelector(".card-title")
.textContent
.toLowerCase();

const modelCard=card.getAttribute("data-model");

const matchModel=(lastModel==="all"||modelCard===lastModel);
const matchSearch=title.includes(search);

if(matchModel && matchSearch){

card.classList.remove("hidden");
visibles++;

}else{

card.classList.add("hidden");

}

});

document.getElementById("contador")
.innerText=visibles+" repuestos encontrados";

document
.getElementById("catalogContainer")
.scrollIntoView({behavior:"smooth"});

document
.querySelectorAll(".filter-btn")
.forEach(btn=>btn.classList.remove("active"));

if(event && event.target.classList.contains("filter-btn")){
event.target.classList.add("active");
}

}

/* ===== MODAL PRODUCTO ===== */

function verProducto(nombre,imagen,precio){

document.getElementById("modalProducto").style.display="flex";

document.getElementById("modalNombre").innerText=nombre;
document.getElementById("modalPrecio").innerText=precio;
document.getElementById("modalImg").src=imagen;

}

function cerrarModal(){

document.getElementById("modalProducto").style.display="none";

}
