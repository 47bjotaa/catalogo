<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Torakku - Repuestos Sprinter</title>

    <style>
        :root {
            --primary-blue: #d10000;
            --secondary-blue: #ff3b3b;
            --dark-bg: #000;
            --light-bg: #f8f9fa;
            --white: #fff;
            --whatsapp: #25d366;
        }

        /* ESTILOS ORIGINALES */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #d10000 0%, #ea2424 50%, #ea922f 100%);
            background-attachment: fixed;
            background-size: cover;
            color: #333;
            margin: 0;
        }

        .welcome-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--dark-bg);
            border-bottom: 10px solid var(--primary-blue);
            text-align: center;
        }

        .brand-name {
            font-size: clamp(3rem, 12vw, 7rem);
            font-weight: 900;
            color: white;
            letter-spacing: -2px;
            text-transform: uppercase;
            line-height: .8;
        }

        .brand-name span { color: var(--primary-blue); }

        .brand-subtitle {
            font-size: 1.1rem;
            color: var(--secondary-blue);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 15px;
        }

        .filter-nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, .98);
            backdrop-filter: blur(5px);
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,.1);
        }

        .filter-btn {
            padding: 10px 18px;
            border: 2px solid var(--primary-blue);
            background: transparent;
            color: var(--primary-blue);
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
            text-transform: uppercase;
            font-size: .8rem;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--primary-blue);
            color: white;
        }

        #searchInput {
            width: 100%;
            max-width: 400px;
            padding: 12px;
            border: 2px solid var(--primary-blue);
            border-radius: 4px;
            outline: none;
        }

        .catalog-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: .3s;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .card-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 10px;
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 10px;
            color: #666;
        }

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            margin-bottom: 15px;
            background: #fafafa;
        }

        .card-title {
            font-size: .95rem;
            font-weight: 700;
            margin-bottom: 15px;
            min-height: 50px;
            text-transform: uppercase;
        }

        .btn-wa {
            background: #1a1a1a;
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 12px;
            font-size: .8rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            border: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 25px;
            max-width: 450px;
            width: 90%;
            border-radius: 10px;
            text-align: center;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        #modalPrecio {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary-blue);
            margin: 15px 0;
        }

        .btn-whatsapp-modal {
            background: var(--whatsapp);
            color: white;
            padding: 15px;
            display: block;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        .hidden { display: none; }
        footer { padding: 60px 20px; background: black; color: white; text-align: center; }

        .btn-add-cart {
            background: var(--primary-blue);
            color: white;
            padding: 15px;
            display: block;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }

        .cart-floating {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--whatsapp);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 3000;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            text-decoration: none;
        }

        .cart-badge {
            background: white;
            color: var(--whatsapp);
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 0.9rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 4px;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        #cart-modal-list {
            text-align: left;
            margin: 15px 0;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.85rem;
        }

        /* --- NUEVOS ESTILOS: CANTIDAD Y ADVERTENCIAS --- */
        .qty-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .qty-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid var(--primary-blue);
            background: white;
            color: var(--primary-blue);
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
        }

        #qty-value {
            font-size: 1.2rem;
            font-weight: bold;
            width: 30px;
        }

        /* CARD DE ADVERTENCIA (Toast) */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 400px;
        }

        .toast-card {
            background: white;
            border-left: 5px solid var(--primary-blue);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast-card.success { border-left-color: var(--whatsapp); }
    </style>
</head>

// SISTEMA DE NOTIFICACIONES (Toast)
function showToast(mensaje, tipo = 'error') {
    const container = document.getElementById("toastContainer");
    const toast = document.createElement("div");
    toast.className = `toast-card ${tipo === 'success' ? 'success' : ''}`;
    toast.innerHTML = `<span>${tipo === 'success' ? '✅' : '⚠️'}</span> <p>${mensaje}</p>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 500);
    }, 3000);
}

        card.innerHTML = `
            <span class="card-tag">SPRINTER ${p.modelo}</span>
            <img class="card-img" src="${p.imagen}" onerror="this.src='https://via.placeholder.com/150?text=Torakku'">
            <h3 class="card-title">${p.nombre}</h3>
            <button class="btn-wa" onclick="verProducto('${p.nombre}','${p.imagen}')">VER DETALLES</button>
        `;
        container.appendChild(card);
    });
}

function verProducto(nombre, imagen) {
    const modal = document.getElementById("modalProducto");
    let precioVal = 0;
    if(costosBase[nombre]) precioVal = Math.round(costosBase[nombre] * 1.30);
    
    document.getElementById("modalNombre").innerText = nombre;
    document.getElementById("modalImg").src = imagen;
    document.getElementById("modalPrecio").innerText = precioVal > 0 ? "$" + precioVal.toLocaleString('es-CL') : "Consultar";
    
    prodActual = { nombre, precio: precioVal };
    cantidadActual = 1;
    document.getElementById("qty-value").innerText = cantidadActual;
    
    document.getElementById("btnWspDinamico").href = `https://wa.me/56984334431?text=Hola Torakku, consulto por: ${nombre}`;
    modal.style.display = "flex";
}

function changeQty(val) {
    cantidadActual += val;
    if(cantidadActual < 1) cantidadActual = 1;
    document.getElementById("qty-value").innerText = cantidadActual;
}

function agregarAlCarrito() {
    if(prodActual) {
        // Buscamos si el producto ya existe para sumar cantidad
        const index = carrito.findIndex(item => item.nombre === prodActual.nombre);
        if(index !== -1) {
            carrito[index].cantidad += cantidadActual;
        } else {
            carrito.push({ ...prodActual, cantidad: cantidadActual });
        }
        
        let totalItems = carrito.reduce((sum, item) => sum + item.cantidad, 0);
        document.getElementById("cart-count").innerText = totalItems;
        showToast("Producto agregado al pedido", 'success');
        cerrarModal();
    }
}

function abrirCarrito() {
    const lista = document.getElementById("cart-modal-list");
    lista.innerHTML = "";
    let total = 0;

    carrito.forEach(p => {
        let sub = p.cantidad * p.precio;
        total += sub;
        lista.innerHTML += `
            <div class="cart-item">
                <span>${p.cantidad}x ${p.nombre}</span>
                <span>$${sub.toLocaleString('es-CL')}</span>
            </div>`;
    });

    document.getElementById("cart-total").innerText = "Total: $" + total.toLocaleString('es-CL');
    document.getElementById("modalCarrito").style.display = "flex";
}

function enviarPedidoWhatsApp() {
    const nombre = document.getElementById("clienteNombre").value;
    const rut = document.getElementById("clienteRut").value;
    const email = document.getElementById("clienteEmail").value;

    if(!nombre || !rut || !email) {
        showToast("Por favor completa tus datos de contacto.");
        return;
    }

    if(carrito.length === 0) {
        showToast("El carrito está vacío.");
        return;
    }

    let msj = `*NUEVO PEDIDO - TORAKKU*\n\n`;
    msj += `*Cliente:* ${nombre}\n`;
    msj += `*RUT:* ${rut}\n`;
    msj += `*Email:* ${email}\n`;
    msj += `──────────────────────\n`;

    let total = 0;
    carrito.forEach(p => {
        let sub = p.cantidad * p.precio;
        total += sub;
        msj += `• ${p.cantidad}x ${p.nombre} ($${sub.toLocaleString('es-CL')})\n`;
    });

    msj += `──────────────────────\n`;
    msj += `*TOTAL ESTIMADO: $${total.toLocaleString('es-CL')}*`;

    window.open(`https://wa.me/56984334431?text=${encodeURIComponent(msj)}`, '_blank');
}

function vaciarCarrito() {
    carrito = [];
    document.getElementById("cart-count").innerText = "0";
    showToast("Carrito vaciado correctamente", 'success');
    cerrarModalCarrito();
}

function cerrarModal() { document.getElementById("modalProducto").style.display = "none"; }
function cerrarModalCarrito() { document.getElementById("modalCarrito").style.display = "none"; }

function filter(model) {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const cards = document.querySelectorAll(".card");
    let visibles = 0;

    cards.forEach(card => {
        const title = card.querySelector(".card-title").textContent.toLowerCase();
        const modelCard = card.getAttribute("data-model");
        const matchModel = (model === 'all' || !model || modelCard === model);
        const matchSearch = title.includes(search);
        if (matchModel && matchSearch) { card.classList.remove("hidden"); visibles++; } else { card.classList.add("hidden"); }
    });
    document.getElementById("contador").innerText = visibles + " repuestos encontrados";
}

window.onload = () => { generarCatalogo(); filter('all'); };
</script>
